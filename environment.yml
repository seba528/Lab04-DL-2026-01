name: lab04-dl-2026-01

channels:
  - conda-forge
  - defaults

dependencies:
  # Python 3.10 mantiene buena compatibilidad con PyTorch y torchvision.
  - python=3.10
  - pip>=24

  # Las dependencias Python se declaran aquí para crear el ambiente usando
  # solamente este archivo, siguiendo la convención del LAB03.
  - pip:
      - torch>=2.2
      - torchvision>=0.17
      - PyYAML>=6.0
      - Pillow>=10.0
      - matplotlib>=3.8
      - pytest>=8.0

